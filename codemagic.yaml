workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.laundrypro.app
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build Flutter
        script: |
          # CFBundleVersion must always increase on App Store Connect.
          # Codemagic PROJECT_BUILD_NUMBER increments per build (avoids stale pubspec on clone).
          flutter build ios --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --dart-define=SUPABASE_URL=https://qakcxkcbpxsknephtszo.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=sb_publishable_PcpNy_iX93e_RqSS0atdHA_O6w6Fr7k
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/Runner.xcarchive/dSYMs/*.dSYM
      - "**/*.dSYM"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
