workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          echo $APP_STORE_CONNECT_PRIVATE_KEY | base64 --decode > /tmp/AuthKey.p8
          app-store-connect fetch-signing-files com.laundrypro.app \
            --type IOS_APP_STORE \
            --private-key /tmp/AuthKey.p8 \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --create
      - name: Set up certificate
        script: keychain add-certificates
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build iOS
        script: |
          flutter build ipa --release \
            --dart-define=SUPABASE_URL=https://qakcxkcbpxsknephtszo.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=sb_publishable_PcpNy_iX93e_RqSS0atdHA_O6w6Fr7k
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: /tmp/AuthKey.p8
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
