name: laundrypro
description: Point - Loyalty Wallet App
publish_to: "none"
version: 1.2.1+46

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & navigation
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0

  # Backend
  supabase_flutter: ^2.12.2

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.2.10
  firebase_crashlytics: ^4.3.10
  flutter_local_notifications: ^17.2.2

  # OTP AutoFill (Android SMS Retriever)
  sms_autofill: ^2.3.0

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Utilities
  intl: ^0.20.2
  local_auth: ^2.2.0
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  google_fonts: ^6.2.1
  share_plus: ^11.0.0
  crypto: ^3.0.6
  uuid: ^4.5.1
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  firebase_auth: ^5.3.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  image: ^4.8.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_logo_adaptive_foreground.png"
  adaptive_icon_foreground_inset: 0
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  web:
    generate: false
  windows:
    generate: false
